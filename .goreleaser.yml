project_name: agent-cli

builds:
  - main: ./cmd/agent-cli
    binary: agent-cli
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: semver
  filters:
    exclude:
      - "^docs:"
      - "^test:"
